<svg width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: dark) {
      .name { fill: #e6edf3; }
      .subtitle { fill: #9198a1; }
      .line { stroke: #30363d; }
    }
    @media (prefers-color-scheme: light) {
      .name { fill: #1f2328; }
      .subtitle { fill: #656d76; }
      .line { stroke: #d1d9e0; }
    }
    .name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 36px;
      font-weight: 700;
      animation: fadeIn 1s ease-in;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.5px;
      animation: fadeIn 1.5s ease-in;
    }
    .line {
      animation: drawLine 1.2s ease-out forwards;
      stroke-dasharray: 700;
      stroke-dashoffset: 700;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
  </style>
  <text x="400" y="48" text-anchor="middle" class="name">Stephan Daaboul</text>
  <text x="400" y="78" text-anchor="middle" class="subtitle">Embedded Systems Engineer · NixOS Package Maintainer</text>
  <line x1="50" y1="105" x2="750" y2="105" class="line" stroke-width="1" fill="none"/>
</svg>
