name: Update README repo table
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate repo table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXCLUDE="Daaboulex hotspotshield-nix CPI_Timeseries_ARIMA RIS-Lab-1-uuv_simulator"
          HIGHLIGHT="linux-corecycler vkBasalt_overlay_wayland kachow vfio-stealth-nix nixos"

          gh repo list Daaboulex --public --no-archived --json name,description,isFork --limit 100 \
            | jq -r --arg exclude "$EXCLUDE" --arg highlight "$HIGHLIGHT" '
              ($exclude | split(" ")) as $ex |
              ($highlight | split(" ")) as $hi |
              [ .[] | select(.name as $n | $ex | index($n) | not) | select(.name as $n | $hi | index($n) | not) ] |
              sort_by(.name | ascii_downcase) |
              .[] |
              "| [\(.name)](https://github.com/Daaboulex/\(.name)) | \(.description // "—") |"
            ' > /tmp/repo_rows.md

          TABLE_HEADER="| Repo | Description |\n|---|---|"

          {
            echo -e "$TABLE_HEADER"
            cat /tmp/repo_rows.md
          } > /tmp/repo_table.md

          awk '
            /<!-- BEGIN auto:repos -->/ {
              print
              getline  # skip comment line
              print "<!-- This table is auto-generated by .github/workflows/update-readme.yml — do not edit manually -->"
              print ""
              while ((getline line < "/tmp/repo_table.md") > 0) print line
              skip = 1
              next
            }
            /<!-- END auto:repos -->/ {
              print ""
              print
              skip = 0
              next
            }
            !skip { print }
          ' README.md > /tmp/new_readme.md

          mv /tmp/new_readme.md README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "chore: update repo table"
            git push
          }
